<div class="register-container">
  <header>
    <img src="assets/logo.png" alt="TaskFlow Logo" class="logo" />
    <h1>TaskFlow</h1>
  </header>

  <form class="register-form">
    <div class="input-field">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="Digite seu e-mail" required />
    </div>

    <div class="input-field">
      <label for="username">Usuário</label>
      <input type="text" id="username" placeholder="Escolha um nome de usuário" required />
    </div>

    <div class="input-field">
      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="Digite sua senha" required />
    </div>

    <div class="input-field">
      <label for="confirm-password">Repita a senha</label>
      <input type="password" id="confirm-password" placeholder="Confirme sua senha" required />
    </div>

    <button type="submit" class="register-button">Cadastrar</button>
  </form>
</div>
