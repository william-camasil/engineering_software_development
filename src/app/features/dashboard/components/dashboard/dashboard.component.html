<div class="dashboard-container">
  <header>
    <img src="assets/logo.png" alt="TaskFlow Logo" class="logo" />
    <h1>TaskFlow</h1>
  </header>

  <section class="task-input">
    <input
      type="text"
      placeholder="Adicione uma nova tarefa"
      class="task-input-field"
    />
    <button class="create-button">Criar</button>
  </section>

  <section class="task-summary">
    <div class="task-stats">
      <h3>Tarefas criadas</h3>
      <span class="task-count">0</span>
    </div>

    <div class="completed-tasks">
      <h3>Concluídas</h3>
      <span class="completed-count">0</span>
    </div>
  </section>

  <section class="no-tasks-message">
    <img src="assets/task-icon.png" alt="Task Icon" class="task-icon" />
    <p>Você ainda não tem tarefas cadastradas. Crie tarefas e organize seus itens a fazer.</p>
  </section>
</div>
